version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: revenue_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: revenue
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - revenue_network

  redis:
    image: redis:7
    container_name: revenue_redis
    ports:
      - "6379:6379"
    networks:
      - revenue_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: revenue-api:latest
    container_name: revenue_api
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - ./keys:/root/keys 
      - ./migrations:/docker-entrypoint-initdb.d   # <-- Add this line         # <-- mount keys to /root/keys to match Dockerfile
    working_dir: /root              # <-- match Dockerfile WORKDIR
    networks:
      - revenue_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  revenue_network:
    driver: bridge